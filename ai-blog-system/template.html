<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - AI Trend Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
        }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #cbd5e1; }
        .prose h2 { font-size: 1.875rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: #f1f5f9; }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-4xl mx-auto mb-12 text-center">
        <div class="inline-block px-4 py-1 mb-4 text-sm font-semibold tracking-wider text-indigo-400 uppercase glass">
            {{ category }}
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
            {{ title }}
        </h1>
        <div class="flex items-center justify-center space-x-4 text-slate-400 text-sm">
            <span>{{ date }}</span>
            <span>•</span>
            <span>AI Generated Discovery</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto glass p-8 md:p-12 mb-12">
        <div class="prose prose-invert max-w-none">
            {{ content }}
        </div>
    </main>

    <footer class="max-w-4xl mx-auto text-center py-8 text-slate-500 text-sm">
        <p>&copy; 2026 AI Trend Blog. All rights reserved.</p>
        <p class="mt-2 italic">Automatically curated and written by Gemini AI.</p>
    </footer>
</body>
</html>
