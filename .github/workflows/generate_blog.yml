name: Daily AI Blog Generation

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC に実行
  workflow_dispatch: # 手動実行も可能にする

permissions:
  contents: write # リポジトリへのプッシュ権限を許可

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-blog-system # すべてのステップをこのディレクトリで実行
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 20 の警告を抑止
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog generation engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python engine.py

      - name: Commit and push changes
        working-directory: . # ここだけルートディレクトリで実行（リポジトリ全体をpushするため）
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ai-blog-system/posts/ ai-blog-system/index.html
          git commit -m "Auto-generate: AI Blog post $(date +'%Y-%m-%d')" || exit 0
          git push
